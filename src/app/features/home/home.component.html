<main class="home">
  <section class="card">
    <h1 class="card__title">Welcome</h1>
    <p class="card__intro">
      You are signed in. The company info, invoices, and generate views land here next.
    </p>

    <nav class="card__nav" aria-label="Sections">
      <a class="card__link" routerLink="/company-info">Company info →</a>
      <a class="card__link" routerLink="/invoices">Invoices →</a>
      <a class="card__link" routerLink="/generate">Generate month →</a>
    </nav>

    <button
      type="button"
      class="card__button"
      [disabled]="busy()"
      (click)="signOut()"
    >
      {{ busy() ? 'Signing out…' : 'Sign out' }}
    </button>
  </section>
</main>
