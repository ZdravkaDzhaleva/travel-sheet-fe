<header class="nav" [class.nav--open]="menuOpen()" role="banner">
  <div class="nav__inner">
    <a class="nav__brand" routerLink="/invoices" aria-label="Home">
      <img src="/icons/logo-travel-sheet.png" alt="Logo" width="100" />
    </a>

    <div class="nav__menu" id="main-nav">
      <nav class="nav__links" aria-label="Main navigation">
        <a
          class="nav__link"
          routerLink="/invoices"
          routerLinkActive="nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >INVOICES</a>
        <a
          class="nav__link"
          routerLink="/generate"
          routerLinkActive="nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >GENERATE</a>
        <a
          class="nav__link"
          routerLink="/company-info"
          routerLinkActive="nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >COMPANY INFO</a>
      </nav>

      <button
        type="button"
        class="nav__sign-out"
        [disabled]="busy()"
        (click)="signOut()"
      >
        {{ busy() ? 'Signing out…' : 'Sign out' }}
      </button>
    </div>

    <button
      type="button"
      class="nav__burger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="main-nav"
      [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'"
    >
      <span class="nav__burger-bar"></span>
      <span class="nav__burger-bar"></span>
      <span class="nav__burger-bar"></span>
    </button>
  </div>
</header>

<div class="navbar-content">
  <router-outlet />
</div>
