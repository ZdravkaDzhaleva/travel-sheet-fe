<div class="error-alert" role="alert">
  <span class="error-alert__icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="18" height="18">
      <circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/>
    </svg>
  </span>
  <div class="error-alert__body">
    <p class="error-alert__title">{{ title() }}</p>
    @if (message()) {
      <p class="error-alert__text">{{ message() }}</p>
    }
    @if (retryable()) {
      <button
        type="button"
        class="error-alert__retry"
        [disabled]="retrying()"
        (click)="onRetry()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="15" height="15">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>
        </svg>
        {{ retrying() ? 'Retrying…' : retryLabel() }}
      </button>
    }
  </div>
</div>
