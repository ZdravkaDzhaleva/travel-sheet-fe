@if (open()) {
  <div class="modal-scrim" (click)="onBackdropClick($event)" (keydown.escape)="close()" tabindex="-1">
    <div
      class="modal-dialog"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      tabindex="-1"
      #dialogEl
    >
      <div class="modal-head">
        <h2 class="modal-title" [id]="titleId">{{ title() }}</h2>
        <button type="button" class="modal-close" aria-label="Close" (click)="close()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" aria-hidden="true" width="18" height="18">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <ng-content select="[modal-body]"></ng-content>
      </div>

      <div class="modal-foot">
        <ng-content select="[modal-footer]"></ng-content>
      </div>
    </div>
  </div>
}
